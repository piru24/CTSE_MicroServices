services:
  mongo:
    image: mongo:7
    container_name: ctse-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: ctse-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"

  authenticate:
    build: ./backend/services/authenticate
    container_name: ctse-auth
    env_file:
      - ./backend/services/authenticate/.env
    ports:
      - "8090:8090"
    depends_on:
      - mongo
      - rabbitmq

  products:
    build: ./backend/services/products
    container_name: ctse-products
    env_file:
      - ./backend/services/products/.env
    ports:
      - "8070:8070"
    depends_on:
      - mongo
      - rabbitmq

  payment:
    build: ./backend/services/payment
    container_name: ctse-payment
    env_file:
      - ./backend/services/payment/.env
    ports:
      - "8500:8500"
    depends_on:
      - authenticate

  order:
    build: ./backend/services/Order
    container_name: ctse-order
    env_file:
      - ./backend/services/Order/.env
    ports:
      - "8020:8020"
    depends_on:
      - mongo
      - rabbitmq
      - authenticate
      - products
      - payment

volumes:
  mongo_data:
