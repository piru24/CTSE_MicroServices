apiVersion: 2023-05-01
kind: ContainerApp
location: eastus
name: order-service
properties:
  managedEnvironmentId: /subscriptions/<SUBSCRIPTION_ID>/resourceGroups/<RESOURCE_GROUP>/providers/Microsoft.App/managedEnvironments/<CONTAINER_APP_ENV>
  configuration:
    ingress:
      external: true
      targetPort: 8020
      transport: auto
      allowInsecure: false
    activeRevisionsMode: Single
    secrets:
      - name: mongo-uri
        value: <MONGO_URI>
      - name: jwt-secret
        value: <JWT_SECRET>
      - name: rabbitmq-url
        value: <RABBITMQ_URL>
      - name: stripe-secret-key
        value: <STRIPE_SECRET_KEY>
  template:
    containers:
      - name: order-service
        image: <REGISTRY>/<IMAGE_NAME>:<TAG>
        resources:
          cpu: 0.5
          memory: 1Gi
        env:
          - name: NODE_ENV
            value: production
          - name: PORT
            value: "8020"
          - name: CORS_ORIGIN
            value: <FRONTEND_ORIGIN>
          - name: PRODUCT_SERVICE_URL
            value: <PRODUCT_SERVICE_URL>
          - name: MONGO_URI
            secretRef: mongo-uri
          - name: JWT_SECRET
            secretRef: jwt-secret
          - name: RABBITMQ_URL
            secretRef: rabbitmq-url
          - name: STRIPE_SECRET_KEY
            secretRef: stripe-secret-key
    scale:
      minReplicas: 1
      maxReplicas: 3
