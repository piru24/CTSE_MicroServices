name: Auth Service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/services/authenticate/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    # ✅ Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # ✅ Login to DockerHub
    - name: Docker Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # ✅ Build image
    - name: Build Docker Image
      run: |
        docker build -t it22358820/auth-service:latest ./backend/services/authenticate

    # ✅ Push image
    - name: Push Docker Image
      run: |
        docker push it22358820/auth-service:latest

    # ✅ Azure Login
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # ✅ Deploy to Azure
    - name: Deploy to Azure Container App
      run: |
        az containerapp update \
          --name auth-service \
          --resource-group microservices-rg2 \
          --image it22358820/auth-service:latest