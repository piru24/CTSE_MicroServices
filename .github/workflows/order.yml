name: Order Service CI (Semi-Automated)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/services/Order/**'

jobs:
  ci-and-docker-push:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Node.js 18 for Order service checks
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install dependencies for the Order service only
      - name: Install dependencies
        working-directory: backend/services/Order
        run: npm install

      # Run security audit, but do not fail pipeline on audit findings
      - name: Run npm audit
        working-directory: backend/services/Order
        run: npm audit --audit-level=high || true

      # Log in to Docker Hub using GitHub repository secrets
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker image for Order service
      - name: Build Docker image
        run: docker build -t it22888952/order-service:latest ./backend/services/Order

      # Push Docker image to Docker Hub
      - name: Push Docker image
        run: docker push it22888952/order-service:latest

      # Azure deployment is intentionally excluded.
      # Manual deployment is required because the current Azure student subscription
      # does not permit creating a service principal for GitHub Actions.
