name: Order Service CI/CD

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - backend/services/Order/**
      - .github/workflows/order-service-ci-cd.yml
  pull_request:
    paths:
      - backend/services/Order/**
      - .github/workflows/order-service-ci-cd.yml
  workflow_dispatch:

concurrency:
  group: order-service-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  security-events: write

env:
  SERVICE_PATH: backend/services/Order
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/order-service

jobs:
  ci:
    name: CI checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/services/Order/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_PATH }}
        run: npm ci

      - name: Syntax check
        working-directory: ${{ env.SERVICE_PATH }}
        run: |
          find . -name "*.js" -type f -print0 | xargs -0 -I {} node --check {}

      - name: Dependency audit (informational)
        working-directory: ${{ env.SERVICE_PATH }}
        run: npm audit --audit-level=high
        continue-on-error: true

  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  docker_publish:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs:
      - ci
      - sast
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_PATH }}
          file: ${{ env.SERVICE_PATH }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: ${{ env.SERVICE_PATH }}
          format: table
          exit-code: 1
          vuln-type: os,library
          severity: CRITICAL,HIGH
