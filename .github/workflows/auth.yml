name: Auth Service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/services/authenticate/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: auth-service

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Node.js (for testing/building if needed)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 3️⃣ Install dependencies (optional but good practice)
      - name: Install dependencies
        working-directory: backend/services/authenticate
        run: npm install

      # 4️⃣ Run basic security audit (DevSecOps)
      - name: Run npm audit
        working-directory: backend/services/authenticate
        run: npm audit --audit-level=high || true

      # 5️⃣ Login to Docker Hub
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6️⃣ Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-service:latest ./backend/services/authenticate

      # 7️⃣ Push Docker image
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/auth-service:latest

      # 8️⃣ Deploy to Azure Container Apps
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          appName: auth-service
          resourceGroup: microservices-rg2
          imageToDeploy: ${{ secrets.DOCKER_USERNAME }}/auth-service:latest